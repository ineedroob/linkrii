<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkrii | Hub</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #52b2a1; /* Oxidized Copper Glow */
            --text: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
        }
        .container { 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo {
            max-width: 250px; /* Adjust size if needed */
            height: auto;
            margin-bottom: 20px;
        }
        p { opacity: 0.7; margin-bottom: 30px; font-size: 14px; margin-top: 0;}
        .links-gap { display: flex; flex-direction: column; gap: 15px; }
        .link { 
            background: #21262d; 
            color: var(--text); 
            text-decoration: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            border: 1px solid transparent;
        }
        .link:hover { 
            background: var(--accent); 
            color: var(--bg);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(82, 178, 161, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Make sure your logo file is uploaded and named logo.png -->
        <img src="logo.png" alt="LinkRii Logo" class="logo">
        <p>Gamer • Developer • Creator</p>
        
        <div class="links-gap">
            <a href="https://youtube.com" class="link">YOUTUBE</a>
            <a href="https://discord.com" class="link">DISCORD SERVER</a>
            <a href="#" class="link">MINECRAFT SERVER</a>
            <a href="#" class="link">LATEST PROJECT</a>
        </div>
    </div>
</body>
</html>
