<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkRii Clicker</title>
    <style>
        :root {
            --wii-blue: #00aaff;
            --wii-bg: #f7f7f7;
        }

        body { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle, #ffffff 0%, #e8f4f8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .wii-container { 
            width: 90%;
            max-width: 500px;
            text-align: center; 
            background: white;
            padding: 50px;
            border-radius: 40px;
            border: 4px solid var(--wii-blue);
            box-shadow: 0 10px 0px rgba(0, 170, 255, 0.1);
        }

        .clicker-logo {
            max-width: 350px;
            height: auto;
            cursor: pointer;
            transition: transform 0.05s active;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .clicker-logo:active {
            transform: scale(0.95);
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--wii-blue);
            margin-top: 20px;
            font-variant-numeric: tabular-nums;
        }

        .label {
            color: #7d7d7d;
            letter-spacing: 2px;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="wii-container">
        <p class="label">TOTAL CLICKS</p>
        <div id="score" class="score-display">0</div>
        
        <br><br>

        <!-- Your logo acts as the button -->
        <img src="LinkRiiWide.PNG" alt="LinkRii Logo" class="clicker-logo" id="logoBtn">
        
        <br><br>
        <p class="label" style="margin-top: 20px;">TAP TO CLICK</p>
    </div>

    <script>
        let count = 0;
        const scoreDisplay = document.getElementById('score');
        const logo = document.getElementById('logoBtn');

        logo.addEventListener('click', () => {
            count++;
            scoreDisplay.innerText = count;
            
            // Subtle "pop" effect
            logo.style.transform = "scale(1.05)";
            setTimeout(() => {
                logo.style.transform = "scale(1)";
            }, 50);
        });
    </script>

</body>
</html>
