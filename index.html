<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkRii Hub</title>
    <style>
        /* Wii / WiiLink Color Palette */
        :root {
            --wii-blue: #00aaff;
            --wii-light-blue: #e0f4ff;
            --wii-gray: #7d7d7d;
            --wii-bg: #f7f7f7;
        }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--wii-bg);
            background-image: radial-gradient(circle, #ffffff 0%, #e8f4f8 100%);
            color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .wii-container { 
            width: 95%; 
            max-width: 600px; 
            text-align: center; 
            background: white;
            padding: 40px;
            border-radius: 40px;
            border: 4px solid var(--wii-blue);
            box-shadow: 0 10px 0px rgba(0, 170, 255, 0.1);
        }

        .logo {
            max-width: 300px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .channel-btn { 
            background: white; 
            color: var(--wii-gray); 
            text-decoration: none; 
            padding: 25px 10px; 
            border-radius: 15px; 
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            border: 3px solid #eee;
            transition: all 0.1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -4px 0 #eee;
        }

        .channel-btn:hover { 
            border-color: var(--wii-blue);
            color: var(--wii-blue);
            transform: scale(1.03);
            background: var(--wii-light-blue);
            box-shadow: inset 0 -4px 0 var(--wii-blue);
        }

        /* Responsive for mobile */
        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
            .wii-container { padding: 20px; border-radius: 20px; }
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: var(--wii-gray);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="wii-container">
        <!-- Using your wide logo file -->
        <img src="LinkRiiWide.PNG" alt="LinkRii Logo" class="logo">
        
        <div class="grid">
            <a href="https://youtube.com" class="channel-btn">YouTube Channel</a>
            <a href="https://discord.com" class="channel-btn">Discord Hub</a>
            <a href="#" class="channel-btn">Minecraft Server</a>
            <a href="#" class="channel-btn">Projects</a>
        </div>

        <p class="footer-text">SELECT A CHANNEL</p>
    </div>
</body>
</html>
